<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السلة | مضغوط ومندي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

.cart-container{
max-width:1000px;
margin:50px auto;
padding:20px;
}

.cart-table{
width:100%;
background:#fff;
border-collapse:collapse;
margin-bottom:30px;
}

.cart-table th,
.cart-table td{
padding:15px;
border:1px solid #ddd;
text-align:center;
}

.cart-table th{
background:#8b5e34;
color:#fff;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:8px 15px;
cursor:pointer;
border-radius:5px;
}

.total-box{
background:#fff;
padding:20px;
margin-bottom:30px;
border-radius:10px;
font-size:22px;
font-weight:bold;
}

.form-box{
background:#fff;
padding:25px;
border-radius:10px;
}

.form-box input,
.form-box textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-family:Cairo;
}

.send-btn{
width:100%;
padding:15px;
background:#25d366;
color:white;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

.empty-cart{
text-align:center;
font-size:22px;
padding:50px;
}

</style>

</head>

<body>

<div class="top-bar">
⚠️ يرجى الحجز قبل موعد الطلب بـ 24 ساعة لضمان تجهيز الطلب بأفضل جودة.
</div>

<nav class="navbar">

<div class="logo">

<img src="images/logo.png" alt="logo">

<div class="logo-text">
<h2>مضغوط ومندي</h2>
<span>نكهات خليجية أصيلة</span>
</div>

</div>

<ul class="nav-links">
<li><a href="index.html">الرئيسية</a></li>
<li><a href="menu.html">المنيو</a></li>
</ul>

</nav>

<div class="cart-container">

<h2 style="text-align:center;margin-bottom:30px;">
🛒 سلة الطلبات
</h2>

<div id="cartContent"></div>

<div class="form-box">

<input
type="text"
id="customerName"
placeholder="الاسم">

<input
type="tel"
id="customerPhone"
placeholder="رقم الهاتف">

<input
type="text"
id="customerAddress"
placeholder="العنوان">

<input
type="date"
id="customerDate">

<textarea
id="customerNotes"
placeholder="ملاحظات"></textarea>

<button
class="send-btn"
onclick="sendOrder()">

إرسال الطلب عبر واتساب

</button>

</div>

</div>

<footer>
<p>
© <span id="year"></span>
مضغوط ومندي - جميع الحقوق محفوظة
</p>
</footer>

<script>

document.getElementById("year").textContent =
new Date().getFullYear();

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

function renderCart(){

let container =
document.getElementById("cartContent");

if(cart.length === 0){

container.innerHTML = `
<div class="empty-cart">
السلة فارغة
</div>
`;

return;

}

let total = 0;

let html = `
<table class="cart-table">

<tr>
<th>الوجبة</th>
<th>السعر</th>
<th>الكمية</th>
<th>الإجمالي</th>
<th>حذف</th>
</tr>
`;

cart.forEach((item,index)=>{

let itemTotal =
item.price * item.qty;

total += itemTotal;

html += `
<tr>

<td>${item.name}</td>

<td>${item.price} جنيه</td>

<td>${item.qty}</td>

<td>${itemTotal} جنيه</td>

<td>

<button
class="remove-btn"
onclick="removeItem(${index})">

حذف

</button>

</td>

</tr>
`;

});

html += `</table>`;

html += `
<div class="total-box">
إجمالي الطلب: ${total} جنيه
</div>
`;

container.innerHTML = html;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function sendOrder(){

if(cart.length===0){

alert("السلة فارغة");

return;

}

let name =
document.getElementById("customerName").value;

let phone =
document.getElementById("customerPhone").value;

let address =
document.getElementById("customerAddress").value;

let date =
document.getElementById("customerDate").value;

let notes =
document.getElementById("customerNotes").value;

let message =
`طلب جديد

الاسم: ${name}

الهاتف: ${phone}

العنوان: ${address}

تاريخ الطلب: ${date}

-----------------

`;

cart.forEach(item=>{

message +=
`- ${item.name} × ${item.qty}

`;

});

message += `

-----------------

ملاحظات:
${notes}
`;

window.open(

`https://wa.me/201044474434?text=${encodeURIComponent(message)}`,

'_blank'

);

}

renderCart();

</script>

</body>

</html>
